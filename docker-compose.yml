services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: spa_user
      POSTGRES_PASSWORD: spa_password
      POSTGRES_DB: spa_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U spa_user -d spa_dev" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: spa_user
      DB_PASSWORD: spa_password
      DB_NAME: spa_dev
      JWT_SECRET: supersecretkey_change_me_in_production
    ports:
      - "3010:3000"

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
